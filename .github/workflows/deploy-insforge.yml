name: Deploy to InsForge

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      INSFORGE_ACCESS_TOKEN: ${{ secrets.INSFORGE_ACCESS_TOKEN }}
      INSFORGE_API_KEY: ${{ secrets.INSFORGE_API_KEY }}
      INSFORGE_PROJECT_ID: ${{ secrets.INSFORGE_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install flyctl for InsForge compute source deploy
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Configure InsForge CLI
        run: |
          mkdir -p ~/.insforge .insforge
          cat > ~/.insforge/config.json <<'JSON'
          {"platform_api_url":"https://api.insforge.dev"}
          JSON
          cat > ~/.insforge/credentials.json <<JSON
          {"access_token":"${INSFORGE_ACCESS_TOKEN}","refresh_token":"","user":{}}
          JSON
          cat > .insforge/project.json <<JSON
          {
            "project_id": "888fdeeb-8165-4701-894d-1d9e8959187a",
            "project_name": "苏夏的数据库",
            "org_id": "d3f5ba10-b2a3-430a-94af-9bbd675f2943",
            "appkey": "kgsfbz4g",
            "region": "ap-southeast",
            "api_key": "${INSFORGE_API_KEY}",
            "oss_host": "https://kgsfbz4g.ap-southeast.insforge.app"
          }
          JSON
          npx @insforge/cli current

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify frontend build
        run: npm run build

      - name: Deploy backend compute service
        id: backend
        run: |
          set +e
          response="$(npx @insforge/cli compute deploy ./backend \
            --name xiasu-api \
            --port 8000 \
            --cpu shared-1x \
            --memory 512 \
            --region sin \
            --env "{\"TOKENDANCE_API_KEY\":\"${{ secrets.TOKENDANCE_API_KEY }}\",\"TOKENDANCE_MODEL\":\"${{ vars.TOKENDANCE_MODEL || 'kimi-k2.6' }}\",\"TOKENDANCE_PROVIDER\":\"${{ vars.TOKENDANCE_PROVIDER || 'infini-ai' }}\"}" \
            --json 2>&1)"
          deploy_status=$?
          set -e

          echo "$response"
          endpoint="$(printf '%s\n' "$response" | sed -n 's/.*"endpointUrl": "\([^"]*\)".*/\1/p' | tail -1)"
          if [ -z "$endpoint" ] || [ "$endpoint" = "null" ]; then
            echo "Compute deploy did not return endpointUrl; checking existing xiasu-api service..."
            endpoint="$(npx @insforge/cli compute list --json | jq -r '.[] | select(.name == "xiasu-api" and .status == "running") | .endpointUrl' | head -1)"
          fi

          if [ -z "$endpoint" ] || [ "$endpoint" = "null" ]; then
            echo "InsForge compute deploy did not return endpointUrl"
            exit "$deploy_status"
          fi

          echo "api_base_url=$endpoint" >> "$GITHUB_OUTPUT"

      - name: Deploy frontend
        run: |
          rm -rf /tmp/xiasu-frontend-source
          mkdir -p /tmp/xiasu-frontend-source
          cp package.json package-lock.json index.html vite.config.ts vercel.json /tmp/xiasu-frontend-source/
          cp -R src /tmp/xiasu-frontend-source/src

          npx @insforge/cli deployments deploy /tmp/xiasu-frontend-source \
            --env "{\"VITE_API_BASE_URL\":\"${{ steps.backend.outputs.api_base_url }}\"}" \
            --meta "{\"commit\":\"${GITHUB_SHA}\",\"backend\":\"${{ steps.backend.outputs.api_base_url }}\"}" \
            --json
